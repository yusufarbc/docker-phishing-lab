services:
  gophish:
    image: gophish/gophish:latest
    container_name: gophish
    restart: unless-stopped
    ports:
      - "3333:3333"
      - "60888:80"
    networks:
      phish-net:
        ipv4_address: 172.29.0.10
    volumes:
      - gophish-data:/opt/gophish
      # Konteyner içi Gophish ayarını ezmek isterseniz bu satırı açın:
      # - ./gophish/config.json:/opt/gophish/config.json:ro

  postfix:
    image: mwader/postfix-relay:latest
    container_name: postfix-relay
    restart: unless-stopped
    environment:
      - POSTFIX_myhostname=simulasyon.local
      - POSTFIX_mynetworks=127.0.0.0/8,172.29.0.10/32
      - POSTFIX_smtpd_recipient_restrictions=permit_mynetworks,reject
    networks:
      phish-net:
        ipv4_address: 172.29.0.20

networks:
  phish-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24

volumes:
  gophish-data: