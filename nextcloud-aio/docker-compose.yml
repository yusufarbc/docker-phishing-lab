# Docker Compose for Nextcloud All-in-One (AIO) with Caddy
# Referans: https://help.nextcloud.com/t/nextcloud-docker-compose-setup-with-caddy-2024/204846

services:
  nextcloud-aio-mastercontainer:
    image: nextcloud/all-in-one:latest
    container_name: nextcloud-aio-mastercontainer
    restart: always
    ports:
      - "8443:8080"
    environment:
      - APACHE_PORT=11000
      - NEXTCLOUD_DATADIR=/var/lib/docker/volumes/nextcloud_aio_nextcloud/_data # Değiştirilebilir
      - NEXTCLOUD_DOMAIN=nextcloud.arnnabilisim.com.tr
    volumes:
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      - /var/run/docker.sock:/var/run/docker.sock:ro

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nextcloud-aio-mastercontainer

volumes:
  nextcloud_aio_mastercontainer:
    name: nextcloud_aio_mastercontainer
  caddy_data:
  caddy_config:
